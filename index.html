<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>D9 Harlem Votes™ — Voter Engagement Tracker</title>
<style>
  :root {
    --red: #CB0606;
    --red-deep: #9B0303;
    --green: #2F5F48;
    --green-deep: #1F4030;
    --black: #1A1A1A;
    --ink: #2E2E2E;
    --muted: #6B6B6B;
    --rule: #DDDDDD;
    --grey-bg: #F4F4F4;
    --paper: #FFFFFF;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
    background: var(--paper);
    color: var(--ink);
    font-size: 16px;
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
  }

  .stripe { display: flex; height: 5px; }
  .stripe .s-red   { flex: 1; background: var(--red); }
  .stripe .s-black { flex: 1; background: var(--black); }
  .stripe .s-green { flex: 1; background: var(--green); }
  .stripe.thin { height: 3px; }

  header {
    background: var(--paper);
    padding: 32px 20px 24px;
    text-align: center;
    border-bottom: 1px solid var(--rule);
  }
  header img.logo {
    width: 140px;
    height: 140px;
    object-fit: contain;
    display: block;
    margin: 0 auto 18px;
  }
  header .wordmark {
    font-size: 38px;
    font-weight: 800;
    letter-spacing: 0.3px;
    line-height: 1.1;
    margin-bottom: 10px;
  }
  header .wm-d9     { color: var(--black); }
  header .wm-harlem { color: var(--black); }
  header .wm-votes  { color: var(--black); position: relative; }
  header .wm-votes sup {
    font-size: 18px;
    font-weight: 700;
    color: var(--black);
    vertical-align: super;
    margin-left: 2px;
  }
  header .sub {
    font-size: 17px;
    color: var(--ink);
    font-weight: 700;
    letter-spacing: 0.5px;
    text-transform: uppercase;
  }

  .wrap {
    max-width: 520px;
    margin: 0 auto;
    padding: 32px 24px 60px;
  }
  label {
    display: block;
    font-size: 16px;
    font-weight: 700;
    color: var(--ink);
    margin: 22px 0 8px;
  }
  label:first-of-type { margin-top: 0; }
  .req { color: var(--red); margin-left: 2px; }
  .optional { color: var(--muted); font-weight: 400; font-size: 14px; margin-left: 4px; }

  select, input[type="text"], textarea {
    width: 100%;
    padding: 14px;
    font-size: 16px;
    font-family: inherit;
    border: 1px solid var(--rule);
    border-radius: 6px;
    background: #fff;
    color: var(--ink);
  }
  select:focus, input:focus, textarea:focus {
    outline: none;
    border-color: var(--green);
    box-shadow: 0 0 0 3px rgba(47,95,72,0.15);
  }
  textarea { resize: vertical; min-height: 80px; }

  .radios { display: flex; flex-direction: column; gap: 10px; margin-top: 4px; }
  .path-group {
    font-size: 12px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.6px;
    color: var(--muted);
    margin: 10px 0 0;
  }
  .path-group:first-child { margin-top: 0; }

  .shift-banner {
    padding: 14px 16px;
    background: var(--grey-bg);
    border-radius: 8px;
    border-left: 4px solid var(--green);
    font-size: 14px;
    color: var(--ink);
    margin-bottom: 4px;
  }
  .shift-banner .who { font-weight: 800; color: var(--black); font-size: 15px; }
  .shift-banner .meta { color: var(--muted); margin-top: 2px; }
  .shift-banner .edit {
    display: inline-block;
    margin-top: 10px;
    font-size: 12px;
    font-weight: 700;
    color: var(--red);
    cursor: pointer;
    text-transform: uppercase;
    letter-spacing: 0.4px;
  }
  .radio {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    padding: 14px;
    border: 1px solid var(--rule);
    border-radius: 6px;
    background: #fff;
    cursor: pointer;
  }
  .radio:has(input:checked) { border-color: var(--green); background: #F5F9F6; }
  .radio input { margin-top: 4px; flex-shrink: 0; accent-color: var(--green); width: 18px; height: 18px; }
  .radio-label { font-size: 16px; line-height: 1.4; }
  .radio-label strong { display: block; font-weight: 700; color: var(--ink); }
  .radio-label .desc { color: var(--muted); font-size: 14px; margin-top: 3px; }

  button {
    width: 100%;
    margin-top: 26px;
    padding: 16px;
    font-size: 17px;
    font-weight: 700;
    color: #fff;
    background: var(--red);
    border: none;
    border-radius: 6px;
    cursor: pointer;
    letter-spacing: 0.5px;
    text-transform: uppercase;
  }
  button:active { background: var(--red-deep); }
  button:disabled { opacity: 0.6; cursor: not-allowed; }

  .status {
    margin-top: 16px;
    padding: 14px 16px;
    border-radius: 6px;
    font-size: 15px;
    font-weight: 500;
    display: none;
  }
  .status.ok {
    background: #E8EFEA;
    border-left: 4px solid var(--green);
    color: var(--green-deep);
    display: block;
  }
  .status.err {
    background: #FDEBEB;
    border-left: 4px solid var(--red);
    color: var(--red-deep);
    display: block;
  }

  .count {
    margin-top: 28px;
    padding: 22px 18px;
    background: var(--grey-bg);
    border-radius: 8px;
    text-align: center;
    font-size: 14px;
    color: var(--muted);
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.4px;
  }
  .count strong {
    display: block;
    font-size: 44px;
    color: var(--green);
    margin-top: 6px;
    font-weight: 800;
    line-height: 1;
  }

  optgroup { font-style: normal; font-weight: 700; color: var(--black); }
  .footer {
    margin-top: 24px;
    text-align: center;
    font-size: 13px;
    color: var(--muted);
    letter-spacing: 0.3px;
  }
  .footer .tm-red   { color: var(--black); font-weight: 700; }
  .footer .tm-black { color: var(--black); font-weight: 700; }
  .footer .tm-green { color: var(--black); font-weight: 700; }

  @media (max-width: 380px) {
    header { padding: 24px 16px 18px; }
    header img.logo { width: 110px; height: 110px; margin-bottom: 14px; }
    header .wordmark { font-size: 30px; }
    header .wm-votes sup { font-size: 14px; }
    header .sub { font-size: 14px; }
  }
</style>
</head>
<body>

<div class="stripe">
  <div class="s-red"></div>
  <div class="s-black"></div>
  <div class="s-green"></div>
</div>

<header>
  <img class="logo" src="logo.png" alt="D9 Harlem Votes™ logo">
  <div class="wordmark">
    <span class="wm-d9">D9</span>
    <span class="wm-harlem">Harlem</span>
    <span class="wm-votes">Votes<sup>™</sup></span>
  </div>
  <div class="sub">Voter Engagement Tracker</div>
</header>

<div class="stripe thin">
  <div class="s-red"></div>
  <div class="s-black"></div>
  <div class="s-green"></div>
</div>

<div class="wrap">

  <div id="setup">

  <label for="shiftDate">Shift Date <span class="req">*</span></label>
  <select id="shiftDate" required>
    <option value="">— Select your shift date —</option>
    <option value="June 6" selected>June 6</option>
    <option value="June 13" disabled>June 13 — not yet active</option>
    <option value="June 19 — Juneteenth" disabled>June 19 — Juneteenth — not yet active</option>
  </select>

  <label for="site">Site <span class="req">*</span></label>
  <select id="site" required>
    <option value="">— Select your site —</option>
    <optgroup label="June 6 &amp; June 13">
      <option>E. 116th St. &amp; Lexington Ave.</option>
      <option>W. 116th St. &amp; Frederick Douglass Blvd.</option>
      <option>W. 116th St. &amp; Malcolm X Blvd.</option>
      <option>W. 125th St. &amp; Adam Clayton Powell Jr. Blvd.</option>
      <option>W. 125th St. &amp; Malcolm X Blvd.</option>
      <option>W. 135th St. &amp; Malcolm X Blvd.</option>
      <option>W. 145th St. &amp; Saint Nicholas Ave.</option>
    </optgroup>
    <optgroup label="June 19 — Juneteenth (not yet active)" disabled>
      <option>W. 120th St. &amp; Malcolm X Blvd.</option>
    </optgroup>
  </select>

  <label for="volunteer">Your Name <span class="req">*</span></label>
  <input type="text" id="volunteer" placeholder="First and last name" autocomplete="name" required>

  <label for="org">Organization <span class="req">*</span></label>
  <select id="org" required>
    <option value="">— Select your organization —</option>
    <option>Alpha Phi Alpha Fraternity, Inc.</option>
    <option>Alpha Kappa Alpha Sorority, Inc.</option>
    <option>Kappa Alpha Psi Fraternity, Inc.</option>
    <option>Omega Psi Phi Fraternity, Inc.</option>
    <option>Delta Sigma Theta Sorority, Inc.</option>
    <option>Phi Beta Sigma Fraternity, Inc.</option>
    <option>Zeta Phi Beta Sorority, Inc.</option>
    <option>Sigma Gamma Rho Sorority, Inc.</option>
    <option>Iota Phi Theta Fraternity, Inc.</option>
    <option>Other-Partner</option>
  </select>
  <input type="text" id="orgOther" placeholder="Type your organization" autocomplete="organization" style="display:none; margin-top:10px;">

  <button id="startBtn">Start Logging</button>
  <div id="setupStatus" class="status"></div>

  </div>

  <div id="logging" style="display:none;">

  <div class="shift-banner" id="shiftBanner"></div>

  <label>Path <span class="req">*</span></label>
  <div class="radios">

    <div class="path-group">Registered / Applied</div>

    <label class="radio">
      <input type="radio" name="path" value="A — D9 Harlem Votes™ Drop-Off">
      <span class="radio-label">
        <strong>Path A — D9 Harlem Votes™ Drop-Off</strong>
        <span class="desc">Voter completed the application with you. You guided them and saw it finished. D9 Harlem Votes™ collects it and delivers to the NYC Board of Elections.</span>
      </span>
    </label>
    <label class="radio">
      <input type="radio" name="path" value="B — Self-Delivery to NYC Board of Elections">
      <span class="radio-label">
        <strong>Path B — Self-Delivery to NYC Board of Elections</strong>
        <span class="desc">Voter completed the application with you. You guided them and saw it finished. They mail or deliver it themselves.</span>
      </span>
    </label>
    <label class="radio">
      <input type="radio" name="path" value="C — Voting Plans">
      <span class="radio-label">
        <strong>Path C — Voting Plans</strong>
        <span class="desc">Voter is already registered and plans to vote. You confirmed their registration, poll site, and what is on the ballot.</span>
      </span>
    </label>

    <div class="path-group">Not Registered</div>

    <label class="radio">
      <input type="radio" name="path" value="D — Plans to Apply">
      <span class="radio-label">
        <strong>Path D — Plans to Apply</strong>
        <span class="desc">Voter is eligible but did not complete an application. You gave them the steps and they plan to apply. Warm lead for follow-up.</span>
      </span>
    </label>
    <label class="radio">
      <input type="radio" name="path" value="E — Eligible, Undecided">
      <span class="radio-label">
        <strong>Path E — Eligible, Undecided</strong>
        <span class="desc">Voter is eligible and got the steps but did not commit or declined for now. Track for later follow-up.</span>
      </span>
    </label>
    <label class="radio">
      <input type="radio" name="path" value="F — Not Yet Eligible">
      <span class="radio-label">
        <strong>Path F — Not Yet Eligible</strong>
        <span class="desc">Voter is not yet eligible to register. You gave guidance on what they need to become eligible: citizenship, age, residency, or rights restoration.</span>
      </span>
    </label>
  </div>

  <label for="notes">Notes <span class="optional">(optional)</span></label>
  <textarea id="notes" placeholder="Anything the Activation Lead should know"></textarea>

  <button id="submitBtn">Log Entry</button>
  <div id="status" class="status"></div>

  <div class="count">
    Your entries this shift
    <strong id="counter">0</strong>
  </div>

  </div>

  <div class="footer">
    <span class="tm-red">D9</span> <span class="tm-black">Harlem</span> <span class="tm-green">Votes™</span> · Boots on the Ground
  </div>

</div>

<script>
  const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwKzCDI12QJrdt4xRKmKC3vHxYYmXOBM5hqAO-Q6Q_uJNDUDC5nvN8B5b4gJ8xU7EOjjA/exec';

  let count = 0;
  let shift = null;

  const PATH_LABELS = {
    'A — D9 Harlem Votes™ Drop-Off': 'Log Registration Application',
    'B — Self-Delivery to NYC Board of Elections': 'Log Registration Application',
    'C — Voting Plans': 'Log Voting Plan',
    'D — Plans to Apply': 'Log Plan to Apply',
    'E — Eligible, Undecided': 'Log Contact',
    'F — Not Yet Eligible': 'Log Referral'
  };
  const PATH_NOUNS = {
    'A — D9 Harlem Votes™ Drop-Off': 'Registration application',
    'B — Self-Delivery to NYC Board of Elections': 'Registration application',
    'C — Voting Plans': 'Voting plan',
    'D — Plans to Apply': 'Plan to apply',
    'E — Eligible, Undecided': 'Contact',
    'F — Not Yet Eligible': 'Referral'
  };

  const setupEl = document.getElementById('setup');
  const loggingEl = document.getElementById('logging');
  const orgSel = document.getElementById('org');
  const orgOther = document.getElementById('orgOther');
  const startBtn = document.getElementById('startBtn');
  const setupStatus = document.getElementById('setupStatus');
  const btn = document.getElementById('submitBtn');
  const statusEl = document.getElementById('status');

  // Show the type-in field only when "Other-Partner" is chosen.
  orgSel.addEventListener('change', function () {
    const other = orgSel.value === 'Other-Partner';
    orgOther.style.display = other ? 'block' : 'none';
    if (!other) orgOther.value = '';
  });

  // Dynamic log-button label, keyed to the selected path.
  function selectedPath() { return document.querySelector('input[name="path"]:checked'); }
  function buttonLabel() {
    const p = selectedPath();
    return p ? (PATH_LABELS[p.value] || 'Log Entry') : 'Log Entry';
  }
  function refreshButton() { if (!btn.disabled) btn.textContent = buttonLabel(); }
  document.querySelectorAll('input[name="path"]').forEach(function (r) {
    r.addEventListener('change', refreshButton);
  });

  // ---- Stage 1: set up the shift once ----
  startBtn.addEventListener('click', startShift);

  function startShift() {
    const shiftDate = document.getElementById('shiftDate').value;
    const site = document.getElementById('site').value;
    const volunteer = document.getElementById('volunteer').value.trim();
    let org = orgSel.value;

    if (!shiftDate) return setErr('Please select your shift date.');
    if (!site) return setErr('Please select your site.');
    if (!volunteer) return setErr('Please enter your name.');
    if (!org) return setErr('Please select your organization.');
    if (org === 'Other-Partner') {
      const typed = orgOther.value.trim();
      if (!typed) return setErr('Please type your organization.');
      org = typed;
    }

    shift = { shiftDate: shiftDate, site: site, volunteer: volunteer, organization: org };

    document.getElementById('shiftBanner').innerHTML =
      '<div class="who">' + esc(volunteer) + ' · ' + esc(org) + '</div>' +
      '<div class="meta">' + esc(site) + ' · ' + esc(shiftDate) + '</div>' +
      '<span class="edit" id="editShift">Change setup</span>';
    document.getElementById('editShift').addEventListener('click', editShift);

    setupStatus.style.display = 'none';
    setupEl.style.display = 'none';
    loggingEl.style.display = 'block';
    window.scrollTo(0, 0);
  }

  function editShift() {
    loggingEl.style.display = 'none';
    setupEl.style.display = 'block';
    window.scrollTo(0, 0);
  }

  // ---- Stage 2: log entries, one voter at a time ----
  btn.addEventListener('click', submit);

  function submit() {
    if (!shift) return showErr('Please set up your shift first.');
    const pathEl = selectedPath();
    const notes = document.getElementById('notes').value.trim();
    if (!pathEl) return showErr('Please select a Path.');

    btn.disabled = true;
    btn.textContent = 'Logging…';
    statusEl.style.display = 'none';

    const payload = {
      siteName: shift.site,
      shiftDate: shift.shiftDate,
      volunteerName: shift.volunteer,
      organization: shift.organization,
      path: pathEl.value,
      notes: notes
    };

    fetch(SCRIPT_URL, {
      method: 'POST',
      mode: 'no-cors',
      headers: { 'Content-Type': 'text/plain;charset=utf-8' },
      body: JSON.stringify(payload)
    })
    .then(function () {
      count++;
      document.getElementById('counter').textContent = count;
      showOk((PATH_NOUNS[pathEl.value] || 'Entry') + ' logged. ✓');
      document.getElementById('notes').value = '';
      pathEl.checked = false;
      btn.disabled = false;
      btn.textContent = buttonLabel();
    })
    .catch(function () {
      btn.disabled = false;
      btn.textContent = buttonLabel();
      showErr('Connection issue. Check signal and try again.');
    });
  }

  function esc(s) {
    return String(s).replace(/[&<>"]/g, function (c) {
      return { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;' }[c];
    });
  }
  function setErr(msg) {
    setupStatus.className = 'status err';
    setupStatus.textContent = msg;
  }
  function showOk(msg) {
    statusEl.className = 'status ok';
    statusEl.textContent = msg;
  }
  function showErr(msg) {
    statusEl.className = 'status err';
    statusEl.textContent = msg;
  }
</script>

</body>
</html>
