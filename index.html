function attachHandlers(m) {
  const certBtn = document.getElementById('continueToCertBtn');
  if (certBtn) {
    certBtn.onclick = async () => {
      state.viewingCert = true;
      await saveState();
      renderAll();
      window.scrollTo({top: 0, behavior: 'smooth'});
    };
  }
  const prev = document.getElementById('prevBtn');
  const next = document.getElementById('nextBtn');
  if (prev) prev.onclick = () => { if (state.current > 0) { state.current--; renderAll(); window.scrollTo({top: 0, behavior: 'smooth'}); } };
  if (next) next.onclick = () => { if (state.current < MODULES.length - 1) { state.current++; renderAll(); window.scrollTo({top: 0, behavior: 'smooth'}); } };

  const checkBtn = document.getElementById('checkBtn');
  if (checkBtn) {
    checkBtn.onclick = () => gradeQuiz(m);
  }

  const certName = document.getElementById('certName');
  if (certName) {
    certName.oninput = async (e) => {
      state.name = e.target.value;
      await Store.set('d9hv_name', state.name);
      // Mirror into the auto-submit name field
      const autoName = document.getElementById('autoSubmitName');
      if (autoName && autoName.value !== state.name) autoName.value = state.name;
      // Refresh the intake form link to include the new name
      const submitBtn = document.getElementById('submitRecordBtn');
      if (submitBtn) submitBtn.href = buildPrefillUrl();
    };
  }
  // Wire up the intake-form button with the latest pre-fill URL
  const submitBtn = document.getElementById('submitRecordBtn');
  if (submitBtn) {
    submitBtn.href = buildPrefillUrl();
  }
  // Wire up the auto-submit (training results) flow
  wireUpAutoSubmit();
}

// Wire up the Step 1 auto-submit card: name + email inputs and the submit button.
// Called both from attachHandlers (initial render) and from gradeQuiz (when cert
// is injected after a passing quiz).
function wireUpAutoSubmit() {
  const nameInput = document.getElementById('autoSubmitName');
  const emailInput = document.getElementById('autoSubmitEmail');
  const btn = document.getElementById('autoSubmitBtn');
  if (!btn) return; // certificate not on page

  if (nameInput) {
    nameInput.oninput = async (e) => {
      state.name = e.target.value;
      await Store.set('d9hv_name', state.name);
      // Mirror into the cert name field
      const certName = document.getElementById('certName');
      if (certName && certName.value !== state.name) certName.value = state.name;
      // Refresh the intake form link
      const intakeBtn = document.getElementById('submitRecordBtn');
      if (intakeBtn) intakeBtn.href = buildPrefillUrl();
    };
  }
  if (emailInput) {
    emailInput.oninput = async (e) => {
      state.email = (e.target.value || '').trim();
      await Store.set('d9hv_email', state.email);
    };
  }
  // If already submitted in a prior session, leave the button in submitted state.
  if (state.resultsSubmitted) return;
  btn.onclick = submitResultsToSheet;
}

async function submitResultsToSheet() {
  const nameInput  = document.getElementById('autoSubmitName');
  const emailInput = document.getElementById('autoSubmitEmail');
  const btn        = document.getElementById('autoSubmitBtn');
  const statusEl   = document.getElementById('autoSubmitStatus');

  function setStatus(msg, type) {
    if (!statusEl) return;
    statusEl.textContent = msg;
    statusEl.className = type || '';
    statusEl.style.display = msg ? 'block' : 'none';
  }

  const name  = (nameInput  && nameInput.value  || '').trim();
  const email = (emailInput && emailInput.value || '').trim();

  if (!name)  { setStatus('Please enter your full name.', 'error'); return; }
  if (!email || !email.includes('@') || !email.includes('.')) {
    setStatus('Please enter a valid email address.', 'error');
    return;
  }

  const final = state.completed && state.completed.final;
  if (!final || !final.passed) {
    setStatus('Final assessment results not found. Please complete the assessment first.', 'error');
    return;
  }

  const score = final.score;
  const total = final.total || 12;
  let profLabel;
  if (score === 12)       profLabel = 'Advanced \u2014 Mentor-Ready (12/12)';
  else if (score >= 10)   profLabel = 'Advanced (10\u201311/12, all safety correct)';
  else                    profLabel = 'Working (9/12, all safety correct)';

  const today = new Date();
  const dateStr = today.toISOString().split('T')[0];
  const attempts = state.finalAttempts ? state.finalAttempts.length : 1;

  const payload = {
    fullName: name,
    email: email,
    dateCompleted: dateStr,
    score: `${score}/${total}`,
    safetyAllCorrect: final.safetyAllCorrect ? 'Yes' : 'No',
    proficiencyLevel: profLabel,
    attempts: String(attempts)
  };

  // Disable button + show progress
  btn.disabled = true;
  btn.textContent = 'Sending\u2026';
  setStatus('Sending your results to coalition leadership\u2026', 'info');

  try {
    // Use text/plain content-type to avoid CORS preflight.
    // Apps Script reads the body via e.postData.contents and parses JSON.
    const response = await fetch(APPS_SCRIPT_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain;charset=utf-8' },
      body: JSON.stringify(payload),
      redirect: 'follow'
    });
    let ok = response.ok;
    try {
      const result = await response.json();
      if (result && result.result === 'success') ok = true;
      else if (result && result.result === 'error') {
        throw new Error(result.message || 'Apps Script returned an error');
      }
    } catch (parseErr) {
      // If we can't parse JSON but the HTTP status was OK, treat as success.
      if (!response.ok) throw parseErr;
    }

    if (!ok) throw new Error('Submission did not complete');

    // Persist
    state.name = name;
    state.email = email;
    state.resultsSubmitted = true;
    await Store.set('d9hv_name', name);
    await Store.set('d9hv_email', email);
    await saveState();

    // Lock the UI
    btn.disabled = true;
    btn.textContent = '\u2713 Results Submitted';
    btn.classList.add('submitted');
    setStatus('Your training results have been sent to D9 Harlem Votes\u2122 coalition leadership. You can now complete Step 2 below.', 'success');
  } catch (err) {
    btn.disabled = false;
    btn.textContent = 'Submit Training Results \u2192';
    setStatus('Sorry, something went wrong sending your results. Please check your internet connection and try again. (' + (err && err.message ? err.message : 'Unknown error') + ')', 'error');
  }
}

function gradeQuiz(m) {
  let score = 0;
  const blocks = document.querySelectorAll('.q-block');
  let allAnswered = true;
  // Track which safety questions were answered correctly (Final only)
  const safetyResults = []; // array of {qi, correct, missed}
  blocks.forEach((block, qi) => {
    const selected = block.querySelector('input:checked');
    if (!selected) { allAnswered = false; return; }
    const chosen = parseInt(selected.value);
    const correct = m.quiz[qi].correct;
    const correctSet = Array.isArray(correct) ? correct : [correct];
    const isSafety = !!m.quiz[qi].safety;
    const wasCorrect = correctSet.includes(chosen);
    if (isSafety) safetyResults.push({ qi: qi + 1, correct: wasCorrect });
    const opts = block.querySelectorAll('.opt');
    opts.forEach((opt, oi) => {
      opt.classList.add('disabled');
      opt.querySelector('input').disabled = true;
      if (correctSet.includes(oi)) opt.classList.add('correct');
      else if (oi === chosen && !correctSet.includes(oi)) opt.classList.add('wrong');
    });
    const feedback = block.querySelector('.feedback');
    feedback.style.display = 'block';
    if (wasCorrect) {
      feedback.className = 'feedback correct';
      feedback.innerHTML = `<strong>Correct.</strong> ${m.quiz[qi].why}`;
      score++;
    } else {
      feedback.className = 'feedback wrong';
      let msg = `<strong>Not quite.</strong> ${m.quiz[qi].why}`;
      if (isSafety) {
        msg = `<strong>Not quite \u2014 this is a critical safety question.</strong> ${m.quiz[qi].why}`;
      }
      if (m.quiz[qi].section) {
        const target = document.getElementById('sec-' + m.quiz[qi].section);
        if (target) {
          const label = target.textContent.trim();
          msg += `<br><a class="review-link" href="#sec-${m.quiz[qi].section}">\u2191 Review: ${label}</a>`;
        }
      }
      feedback.innerHTML = msg;
    }
  });

  if (!allAnswered) {
    alert('Please answer all questions before checking.');
    return;
  }

  const isFinal = m.id === 'final';
  const resultEl = document.getElementById('quizResult');
  resultEl.style.display = 'block';

  if (isFinal) {
    // Two-gate Final scoring
    const totalSafety = safetyResults.length;
    const safetyMissed = safetyResults.filter(r => !r.correct);
    const safetyAllCorrect = safetyMissed.length === 0;
    const overallPassed = score >= 9;
    const passed = safetyAllCorrect && overallPassed;

    // Track attempt history
    if (!state.finalAttempts) state.finalAttempts = [];
    state.finalAttempts.push({
      score: score,
      total: m.quiz.length,
      safetyMissed: safetyMissed.map(r => r.qi),
      passed: passed,
      date: new Date().toISOString()
    });
    state.completed[m.id] = {
      score: score,
      total: m.quiz.length,
      attempts: state.finalAttempts.length,
      safetyAllCorrect: safetyAllCorrect,
      passed: passed,
      date: new Date().toISOString()
    };
    saveState();
    renderSidebar();

    // Determine proficiency level
    let proficiencyLabel = '';
    let proficiencyClass = '';
    if (passed) {
      if (score === 12) proficiencyLabel = 'Advanced \u2014 Mentor-Ready';
      else if (score >= 10) proficiencyLabel = 'Advanced';
      else proficiencyLabel = 'Working';
      proficiencyClass = '';
    }

    const attemptNum = state.finalAttempts.length;

    if (passed) {
      // BOTH GATES PASSED
      resultEl.className = 'quiz-result';
      resultEl.innerHTML = `
        <div style="font-size:18px; font-weight:700; margin-bottom:8px;">You\u2019re ready.</div>
        <div style="margin-bottom:6px;"><strong>Score:</strong> ${score} of ${m.quiz.length} correct.</div>
        <div style="margin-bottom:6px;"><strong>All ${totalSafety} critical safety questions:</strong> correct.</div>
        <div style="margin-bottom:6px;"><strong>Proficiency level:</strong> ${proficiencyLabel}</div>
        <div style="margin-bottom:6px;"><strong>Attempt:</strong> ${attemptNum}</div>
        <div style="margin-top:10px;">You\u2019re approved to volunteer at a D9 Harlem Votes&trade; activation table. Scroll down for your certificate.</div>
      `;
      // Insert celebration video between quiz result and certificate
      const passVideoHTML = `
        <div class="pass-video-wrap" id="passVideoWrap">
          <div class="pass-video-stage">
            <video id="passVideo" class="pass-video" src="Get_Laced_Up.mp4" autoplay muted playsinline preload="auto"></video>
            <button class="pass-video-replay" id="passVideoReplay" type="button" aria-label="Replay video">
              <svg viewBox="0 0 24 24" width="32" height="32" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="1 4 1 10 7 10"></polyline>
                <path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"></path>
              </svg>
            </button>
          </div>
        </div>
      `;
      document.getElementById('content').insertAdjacentHTML('beforeend', passVideoHTML);
      // Wire replay: show ↻ button when video ends, restart on click
      const passVideo = document.getElementById('passVideo');
      const passReplay = document.getElementById('passVideoReplay');
      if (passVideo && passReplay) {
        passVideo.addEventListener('ended', () => passReplay.classList.add('show'));
        passReplay.addEventListener('click', () => {
          passReplay.classList.remove('show');
          passVideo.currentTime = 0;
          passVideo.play();
        });
      }
      setTimeout(() => {
        state.viewingCert = false; // first pass: show video, not cert
        saveState();
        const videoHtml = renderFinalVideoPage();
        document.getElementById('content').insertAdjacentHTML('beforeend', videoHtml);
        const continueBtn = document.getElementById('continueToCertBtn');
        if (continueBtn) {
          continueBtn.onclick = async () => {
            state.viewingCert = true;
            await saveState();
            renderAll();
            window.scrollTo({top: 0, behavior: 'smooth'});
          };
        }
        const slot = document.getElementById('finalVideoSlot');
        if (slot) slot.scrollIntoView({ behavior: 'smooth' });
        return;
        const certName = document.getElementById('certName');
        if (certName) {
          certName.oninput = async (e) => {
            state.name = e.target.value;
            await Store.set('d9hv_name', state.name);
            const autoName = document.getElementById('autoSubmitName');
            if (autoName && autoName.value !== state.name) autoName.value = state.name;
            const sb = document.getElementById('submitRecordBtn');
            if (sb) sb.href = buildPrefillUrl();
          };
        }
        const submitBtn = document.getElementById('submitRecordBtn');
        if (submitBtn) submitBtn.href = buildPrefillUrl();
        // Wire up Step 1 auto-submit (name, email, submit-to-sheet button)
        wireUpAutoSubmit();
        // Scroll to the video first (celebration moment); cert sits below it
        document.getElementById('passVideoWrap').scrollIntoView({ behavior: 'smooth', block: 'start' });
      }, 400);
    } else if (!safetyAllCorrect) {
      // SAFETY GATE FAILED \u2014 must retake
      resultEl.className = 'quiz-result fail';
      const missedList = safetyMissed.map(r => `Q${r.qi}`).join(', ');
      resultEl.innerHTML = `
        <div style="font-size:18px; font-weight:700; margin-bottom:8px;">Retake required.</div>
        <div style="margin-bottom:6px;"><strong>Score:</strong> ${score} of ${m.quiz.length} correct.</div>
        <div style="margin-bottom:6px;"><strong>Critical safety questions missed:</strong> ${missedList}</div>
        <div style="margin-bottom:6px;"><strong>Attempt:</strong> ${attemptNum}</div>
        <div style="margin-top:10px;">These are questions every D9 Harlem Votes&trade; volunteer must answer correctly before serving at the table. The wrong move here can harm a voter or invalidate a registration. <strong>Please review the module(s) above and retake the assessment.</strong></div>
      `;
    } else {
      // SAFETY OK, but OVERALL gate failed (< 9/12)
      resultEl.className = 'quiz-result fail';
      resultEl.innerHTML = `
        <div style="font-size:18px; font-weight:700; margin-bottom:8px;">Almost there.</div>
        <div style="margin-bottom:6px;"><strong>Score:</strong> ${score} of ${m.quiz.length} correct.</div>
        <div style="margin-bottom:6px;"><strong>All ${totalSafety} critical safety questions:</strong> correct.</div>
        <div style="margin-bottom:6px;"><strong>Attempt:</strong> ${attemptNum}</div>
        <div style="margin-top:10px;">You answered all the safety-critical questions correctly, which is the most important thing. But your overall score is below the 9 of 12 needed to pass. Review the questions you missed above and retake the assessment.</div>
      `;
    }
  } else {
    // Regular module \u2014 simple pass/fail
    const passThreshold = Math.ceil(m.quiz.length * 0.66);
    const passed = score >= passThreshold;
    if (passed) {
      resultEl.className = 'quiz-result';
      resultEl.innerHTML = `<strong>${score} of ${m.quiz.length} correct.</strong> Module marked complete.`;
      state.completed[m.id] = { score: score, total: m.quiz.length, date: new Date().toISOString() };
      saveState();
      renderSidebar();
    } else {
      resultEl.className = 'quiz-result fail';
      resultEl.innerHTML = `<strong>${score} of ${m.quiz.length} correct.</strong> Review the module above and try the check again.`;
    }
  }

  document.getElementById('checkBtn').textContent = 'Try again';
  document.getElementById('checkBtn').onclick = () => { renderContent(); window.scrollTo({top: document.getElementById('quiz').offsetTop - 80, behavior: 'smooth'}); };
}

function renderAll() {
  renderSidebar();
  renderContent();
}

// ============================================================
// RESET
// ============================================================
document.getElementById('resetBtn').onclick = async () => {
  if (confirm('Reset all progress? This will clear completed modules and your name from the certificate. (Your edits to the Welcome screen will be kept \u2014 use the Reset button on that page to reset those separately.)')) {
    await Store.delete('d9hv_progress');
    await Store.delete('d9hv_name');
    await Store.delete('d9hv_email');
    state = { current: 0, completed: {}, name: '', email: '', resultsSubmitted: false, viewingCert: false, introContent: state.introContent, introEditing: false };
    renderAll();
  }
};

(async function init() {
  await loadState();
  renderAll();
